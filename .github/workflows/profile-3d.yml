name: GitHub Profile 3D Contrib

# 生成 3D 立体柱状贡献图（yoshi389111/github-profile-3d-contrib）
# 触发方式：
#   1) push 到 main（忽略生成物目录，避免自我循环）—— 推送后立即首跑生成图
#   2) 每天定时刷新
#   3) 手动触发
on:
  push:
    branches: [main]
    paths-ignore:
      - "profile-3d-contrib/**"
  schedule:
    - cron: "0 18 * * *" # 每天 18:00 UTC 刷新一次
  workflow_dispatch:

# 关键：显式授予写权限，让 Action 能把生成的 SVG 提交回仓库
# （无需你到 Settings 里手动改 Workflow permissions）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contrib SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .
          git commit -m "chore: update 3D contribution graph [skip ci]" || echo "No changes to commit"
          git push
