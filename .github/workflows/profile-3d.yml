name: GitHub Profile 3D Contrib

# 生成 3D 立体柱状贡献图（yoshi389111/github-profile-3d-contrib）
# 触发方式：
#   1) push 到 main（忽略生成物目录，避免自我循环）—— 推送后立即首跑生成图
#   2) 每天定时刷新
#   3) 手动触发
# 说明：改动 .gitattributes（如让 Markdown 计入语言统计）后，GitHub 需要
#       几分钟重新索引仓库语言，之后需重跑本 workflow 才能让饼图用上新数据。
on:
  push:
    branches: [main]
    paths-ignore:
      - "profile-3d-contrib/**"
  schedule:
    - cron: "0 18 * * *" # 每天 18:00 UTC 刷新一次
  workflow_dispatch:

# 关键：显式授予写权限，让 Action 能把生成的 SVG 提交回仓库
# （无需你到 Settings 里手动改 Workflow permissions）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contrib SVGs
        uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          # 优先用自建 PAT（secrets.PROFILE_TOKEN）以统计私有库贡献；
          # 若未配置该 secret，则回退到默认 GITHUB_TOKEN（仅公开贡献）。
          # 配置方法见 .github/profile-3d.json 同目录说明 / README 提交记录。
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          # 自定义配置：彩虹配色 + 内置 darkMode（单文件自动跟随明暗背景）
          # 输出 profile-3d-contrib/profile-customize.svg
          SETTING_JSON: .github/profile-3d.json

      - name: Recolor "other" pie slice
        run: |
          # 饼图里的 "other" 分片颜色由 action 源码硬编码为深灰 #444444，
          # 与彩虹主题格格不入（尤其 other 占比大时）。这里生成后替换为
          # 中灰紫 #8b7fa8，融入紫色/彩虹主题又保持低调。
          # 该颜色仅用于 other 分片（图例小方块 + 扇形），全局替换是安全的。
          sed -i 's/#444444/#8b7fa8/g' profile-3d-contrib/profile-customize.svg
          echo "Recolored 'other' slice: #444444 -> #8b7fa8"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .
          git commit -m "chore: update 3D contribution graph [skip ci]" || echo "No changes to commit"
          git push
